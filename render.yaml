services:
  - type: web
    name: moyano-motos-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npx prisma generate
    startCommand: npm run start:render
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: moyano-motos-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SECRET_SESSION
        generateValue: true

  - type: web
    name: moyano-motos-demo
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_HOST
        fromService:
          name: moyano-motos-api
          type: web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: moyano-motos-db
    plan: free
    databaseName: moyano_motos
    user: moyano_motos
