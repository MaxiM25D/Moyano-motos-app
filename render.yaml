services:
  - type: web
    name: moyano-motos-api
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm ci && npx prisma generate
    startCommand: npm run start:render
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: CORS_ORIGIN
        value: https://moyano-motos-demo.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: moyano-motos-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: moyano-motos-demo
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        value: https://moyano-motos-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: moyano-motos-db
    plan: basic-256mb
    diskSizeGB: 1
    databaseName: moyano_motos
    user: moyano_motos
